<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>jQuery 進階</title>
    <style>
        .box {
            width: 200px;
            height: 100px;
            background-color: #3498db;
            color: white;
            text-align: center;
            line-height: 100px;
            margin: 10px;
        }
        .item {
            padding: 10px;
            background: #ecf0f1;
            margin: 5px;
        }
    </style>
</head>
<body>
    <h1>jQuery 進階練習</h1>
    
    <!-- Step 1 用 -->
    <ul id="list">
        <li class="item">原本的項目 1</li>
        <li class="item">原本的項目 2</li>
    </ul>
    <button id="addBtn">新增項目</button>
    <button id="removeBtn">移除最後一個</button>
    
    <!-- Step 2 用 -->
    <input type="text" id="myInput" placeholder="輸入文字">
    <button id="getValBtn">取得輸入值</button>
    
    <!-- Step 3 用 -->
    <div class="box" id="myBox">我是 Box</div>
    <button id="fadeBtn">淡出/淡入</button>
    <button id="slideBtn">滑動</button>
    <button id="customBtn">自定義</button>
    
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
