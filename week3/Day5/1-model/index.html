<!DOCTYPE html>
<html lang="zh-TW">
    <head>
        <meta charset="UTF-8">
        <title>Modal 練習</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <button id="openBtn">打開 Modal</button>
        <div class="modal-overlay">
            <div class="modal-box">
                <button class="modal-close">×</button>
                <h2>Modal 標題</h2>
                <p>這是 Modal 的內容。</p>
                <button class="modal-ok">確定</button>
            </div>
        </div>

        <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
        <script src="script.js"></script>
    </body>
</html>
