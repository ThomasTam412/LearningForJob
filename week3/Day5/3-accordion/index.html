<!DOCTYPE html>
<html lang="zh-TW">
    <head>
        <meta charset="UTF-8">
        <title>Accordion 練習</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <div class="accordion">
            <div class="item">
                <div class="question">
                    甚麼是退貨政策？<span class="arrow">▼</span>
                </div>
                <div class="answer">
                    <p>我們提供 7 天內無條件退貨...</p>
                </div>
            </div>

            <div class="item">
                <div class="question">
                    如何聯絡客服？<span class="arrow">▼</span>
                </div>
                <div class="answer">
                    <p>Email: service@example.com</p>
                </div>
            </div>

            <div class="item">
                <div class="question">
                    關於我們<span class="arrow">▼</span>
                </div>
                <div class="answer">
                    <p>......</p>
                </div>
            </div>
        </div>

        <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
        <script src="script.js"></script>
    </body>
</html>
