<!DOCTYPE html>
<html lang="zh-TW">
    <head>
        <meta charset="UTF-8">
        <title>TodoList</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <div class="content">
            <div class="container">
                <h1 class="title">我的待辦清單</h1>
                <div class="inputSpace">
                    <input type="text" id="todoInput">
                    <button id="addBtn" class="btn">新增</button>
                </div>
                <div class="listSpace">
                    <ul id="todoList"></ul>
                </div>
                <p id="count">總共 0 項</p>
            </div>
        </div>
        <script src="script.js"></script>
    </body>
</html>
