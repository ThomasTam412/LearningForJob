<!DOCTYPE html>
<html lang="zh-TW">
    <head>
        <meta charset="UTF-8">
        <title>JS 練習一</title>
    </head>
    <body>
        <h1>Week2 Day3</h1>
        <h3>練習一: BMI計算器</h3>
        <p>要求1. 宣告兩個變數: weight(體重 kg)和 height(身高 m);</p>
        <p>要求2. 計算 BMI;</p>
        <p>要求3. 根據 BMI 判斷分類</p>
        <h3>BMI 範圍</h3>
        <table>
            <tr>
                <th>BMI 範圍</th>
                <th>分類</th>
            </tr>
            <tr>
                <td>< 18.5</td>
                <td>過輕</td>
            </tr>
            <tr>
                <td>18.5 ~ 24(不含 24)</td>
                <td>正常</td>
            </tr>
            <tr>
                <td>24 ~ 27(不含 27)</td>
                <td>過重</td>
            </tr>
            <tr>
                <td>≥ 27</td>
                <td>肥胖</td>
            </tr>
        </table>
        <h3>BMI 公式</h3>
        <p>BMI = 體重(kg) / 身高(m)^2</p>

        <script src="script.js"></script>
    </body>
</html>
