<!DOCTYPE html>
<html lang="zh-TW">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>菜單</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <nav class="navbar">
            <div class="logo">超哥大排檔</div>
            <div class="menu">
                <ul>
                    <li><a href="#">菜單</a></li>
                    <li><a href="#">訂位</a></li>
                    <li><a href="#">關於</a></li>
                    <li><a href="#">聯絡</a></li>
                </ul>
            </div>
        </nav>

        <div class="content">
            <h1>本日推薦菜單</h1>
            <p>New Daily Specials</p>

            <div class="card-container">
                <div class="card">
                    <img src="https://picsum.photos/200?random=1" alt="菜品1" class="image">
                    <h2 class="name">清蒸海魚</h2>
                    <p class="describe">選取斤半海魚，絕對生鮮。</p>
                    <p class="price">139/斤</p>
                    <button class="btn">加入訂單</button>
                </div>

                <div class="card">
                    <img src="https://picsum.photos/200?random=2" alt="菜品2" class="image">
                    <h2 class="name">椒鹽系列</h2>
                    <p class="describe">大排檔經典，聚會必點。</p>
                    <p class="price">粟米88、九肚98、鮮魷108</p>
                    <button class="btn">加入訂單</button>
                </div>

                <div class="card">
                    <img src="https://picsum.photos/200?random=3" alt="菜品3" class="image">
                    <h2 class="name">小炒系列</h2>
                    <p class="describe">鍋氣十足，送酒一流。</p>
                    <p class="price">78/份</p>
                    <button class="btn">加入訂單</button>
                </div>

                <div class="card">
                    <img src="https://picsum.photos/200?random=4" alt="菜品4" class="image">
                    <h2 class="name">上湯時菜</h2>
                    <p class="describe">時節靚菜，財氣滾滾。</p>
                    <p class="price">68/份</p>
                    <button class="btn">加入訂單</button>
                </div>

                <div class="card">
                    <img src="https://picsum.photos/200?random=5" alt="菜品5" class="image">
                    <h2 class="name">明爐燒味</h2>
                    <p class="describe">粵菜經典，名傳四海。</p>
                    <p class="price">88/例</p>
                    <button class="btn">加入訂單</button>
                </div>

                <div class="card">
                    <img src="https://picsum.photos/200?random=6" alt="菜品6" class="image">
                    <h2 class="name">啫啫煲</h2>
                    <p class="describe">重口至愛，回味無窮。</p>
                    <p class="price">98/煲</p>
                    <button class="btn">加入訂單</button>
                </div>
            </div>
        </div>
    </body>
</html>
