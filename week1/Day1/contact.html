<!DOCTYPE html>
<html lang="zh-TW">
    <head>
        <meta charset="UTF-8">
        <title>聯絡表</title>
    </head>
    <body>
        <h1>聯絡表</h1>
        <form action="#" method="post">
            <label for="name">姓名</label>
            <input type="text" id="name" name="name">

            <label for="email">郵箱</label>
            <input type="email" id="email" name="email">

            <label for="gender">性別</label>
            <input type="radio" id="male" name="gender" value="male">男
            <input type="radio" id="female" name="gender" value="female">女

            <label for="question">詢問類型</label>
            <select id="question" name="question">
                <option value="general">一般查詢</option>
                <option value="technical">技術支援</option>
                <option value="complaint">投訴</option>
            </select>

            <label for="message">留言</label>
            <textarea id="message" name="message"></textarea>

            <button type="submit">提交</button>
            <button type="reset">重設</button>
        </form>
    </body>
</html>
