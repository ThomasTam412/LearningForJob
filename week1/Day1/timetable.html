<!DOCTYPE html>
<html lang="zh-TW">
    <head>
        <meta charset="UTF-8">
        <title>TimeTable</title>
    </head>
    <body>
        <h1>課程表</h1>
        <table border="1">

                    <th>時間</th>

                    <td>數學</td>
                    <td>物理</td>

                    <td>英文</td>
                    <td>生物</td>
                    <td>語文</td>
                    <td>品德</td>
                </tr>
                <tr>
                    <td>11:00 ~ 11:45</td>
                    <td>語文</td>
                    <td>美術</td>
                    <td>電腦</td>
                    <td>化學</td>
                    <td>數學</td>
                </tr>
                <tr>
                    <td>12:00 ~ 12:45</td>
                    <td>數學</td>
                    <td>物理</td>
                    <td>體育</td>
                    <td>生物</td>
                    <td>英文</td>
                </tr>
            </tbody>
        </table>

</html>
