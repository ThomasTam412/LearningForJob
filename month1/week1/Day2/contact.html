<!DOCTYPE html>
<html lang="zh-TW">
    <head>
        <meta charset="UTF-8">
        <title>聯絡表</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        
        <div class="form-container">
            <h1 class="page-title">聯絡我們</h1>
            <form action="#" method="post" class="contact-form">
                <div class="form-group">
                    <label for="name">姓名</label>
                    <input type="text" id="name" name="name">
                </div>

                <div class="form-group">
                    <label for="email">郵箱</label>
                    <input type="email" id="email" name="email">
                </div>

                <div class="form-group">
                    <label>性別</label>
                    <div class="radio-group">
                        <input type="radio" id="male" name="gender" value="male">
                        <label for="male">男</label>
                        <input type="radio" id="famale" name="gender" value="female">
                        <label for="female">女</label>
                    </div>
                </div>

                <div class="form-group">
                    <label for="question">詢問類型</label>
                    <select id="question" name="question">
                        <option value="general">一般查詢</option>
                        <option value="technical">技術支援</option>
                        <option value="complaint">投訴</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="message">留言</label>
                    <textarea id="message" name="message" rows="5"></textarea>
                </div>
                
                <div class="form-actions">
                    <button type="submit" class="btn-submit">提交</button>
                    <button type="reset" class="btn-reset">重設</button>
                </div>
            </form>
        </div>
    </body>
</html>
