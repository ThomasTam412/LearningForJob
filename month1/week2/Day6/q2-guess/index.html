<!DOCTYPE html>
<html lang="zh-TW">
    <head>
        <meta charset="UTF-8">
        <title>猜數字</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <div class="content">
            <div class="container">
                <h1 class="title">小遊戲:猜數字</h1>
                <div class="screen">
                    <p class="screenContent">開始遊戲</p>
                    <p class="hint">1 ~ 100</p>
                </div>
                <div class="opratingSpace">
                    <p class="frequencyContent">次數: 0</p>
                    <input type="number" id="guessInput">
                    <button class="btn guessBtn">猜!</button>
                </div>
                <button class="btn restartBtn">重新開始</button>
            </div>
        </div>

        <script src="script.js"></script>
    </body>
</html>
